<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>唐山AG回城电竞商业中心 | 招商手册</title>
    <style>

        body {

            color: #ffffff;
            line-height: 1.5;

        }
        .app {
            max-width: 720px;
            margin: 0 auto;
            background: linear-gradient(145deg, #0a0c16 0%, #0f1220 100%);

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1100;

            width: auto;

        }
        .nav-menu {

        }
        .nav-item {
            background: rgba(241, 90, 36, 0.12);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f5a65b;
            cursor: pointer;
            border: 1px solid rgba(241, 90, 36, 0.3);
            flex-shrink: 0;
            transition: 0.2s;
        }
        .nav-item.active, .nav-item:active {
            background: #f15a24;
            color: white;
        }
        .pages-container { position: relative; }
        .page {
            display: none;
            padding: 1.2rem 1.2rem 90px 1.2rem;
            animation: fade 0.3s;
        }
        .page.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 720px;
            margin: 0 auto;
            background: rgba(8, 10, 20, 0.92);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(241, 90, 36, 0.35);

        .nav-btn {

            border: 1px solid rgba(241, 90, 36, 0.5);
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f5a65b;
            cursor: pointer;
        }
        .page-indicator {
            background: #1a1f2c;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #f5a65b;
        }
        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(125deg, #fff, #f5a65b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-left: 5px solid #f15a24;
            padding-left: 0.9rem;
        }
        .golden-card {
            background: linear-gradient(115deg, #f15a24, #ff7a3f);
            border-radius: 28px;
            padding: 1.3rem;
            text-align: center;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: rgba(19, 23, 34, 0.75);
            border-radius: 28px;
            padding: 1rem;
            text-align: center;
        }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: #f5a65b; }
        .floor-item, .compare-card, .scene-card, .policy-box, .form-card {
            background: rgba(17, 21, 31, 0.7);
            border-radius: 28px;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid rgba(241,90,36,0.15);
        }
        .brand-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.8rem 0; }
        .brand-list span { background: #232838; padding: 0.3rem 0.9rem; border-radius: 40px; font-size: 0.7rem; }
        .img-wrapper { margin: 1rem 0; border-radius: 24px; overflow: hidden; }
        .img-wrapper img { width: 100%; display: block; border-radius: 20px; }
        input, select, textarea {
            background: #1b1f2c;
            border: 1px solid #2f3548;
            padding: 12px 18px;
            border-radius: 60px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
            font-size: 0.9rem;
        }
        button {
            background: linear-gradient(95deg, #f15a24, #ff7a3f);
            border: none;
            width: 100%;
            padding: 13px;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-msg.show { opacity: 1; }
        .process-steps { display: flex; flex-wrap: wrap; gap: 10px; margin: 1rem 0; }
        .step { background: #141a28; border-radius: 28px; padding: 0.7rem; text-align: center; flex: 1; min-width: 80px; }
        .step-num { background: #f15a24; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 60px; margin-bottom: 6px; font-weight: 800; }
        .highlight { color: #f5a65b; font-weight: 700; }
        @media (max-width: 500px) { .page { padding: 1rem 1rem 90px; } .nav-item { padding: 5px 10px; font-size: 0.7rem; } .nav-logo img { height: 28px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="top-nav">
        <div class="nav-logo">
            <img src="images/ag-logo.png" alt="AG回城" onerror="this.onerror=null; this.parentNode.innerHTML='⚡ AG·回城'; this.parentNode.style.fontWeight='800'; this.parentNode.style.background='linear-gradient(135deg,#fff,#f5a65b)'; this.parentNode.style.webkitBackgroundClip='text'; this.parentNode.style.backgroundClip='text'; this.parentNode.style.color='transparent';">
        </div>
        <div class="nav-menu" id="topNavMenu">
            <div class="nav-item" data-page="0">首页</div>
            <div class="nav-item" data-page="1">热爱·变革</div>
            <div class="nav-item" data-page="2">业态·共生</div>
            <div class="nav-item" data-page="3">运营赋能</div>
            <div class="nav-item" data-page="4">招商入驻</div>
        </div>
    </div>
    <div class="pages-container" id="pagesContainer"></div>
    <div class="bottom-nav">
        <div class="nav-btn" id="prevBtn">◀ 上一页</div>

        <div class="nav-btn" id="nextBtn">下一页 ▶</div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ======================= 楼层数据 =======================
    const floors = [
        { level: "B1", name: "烟火集市", desc: "生鲜市集+特色餐饮。", brands: ["大鑫烧鸟","唐人夜食","刀板香","衢小满"] },
        { level: "1F", name: "装备泉水", desc: "电竞装备+数码潮品+美妆茶饮。", brands: ["华为","荣耀","汉堡王","吉野家","瑞幸咖啡","宝可梦授权店"] },
        { level: "2F", name: "潮玩空间", desc: "二次元专属聚集地。", brands: ["飞享俱乐部","射手部落","谷子店","WeSpeace腾讯官方店"] },
        { level: "3F", name: "先知峡谷", desc: "亲子成长空间。", brands: ["帆书","枫丹云舍","海伦钢琴"] },
        { level: "4F", name: "次元穿越", desc: "电竞+沉浸娱乐+夜经济。", brands: ["金逸影城","云海肴","共和之约"] },
        { level: "5F", name: "运练营地", desc: "24h运动健康空间。", brands: ["绿树电竞","麦粒KTV","自助舞蹈室"] },
        { level: "6F", name: "云中见影", desc: "宠物主题空间。", brands: ["多家品牌洽谈中"] }
    ];
    function renderFloors() {
        return floors.map(f => `<div class="floor-item">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;"><span style="background:#f15a24; padding:4px 12px; border-radius:60px;">${f.level}</span><strong>${f.name}</strong></div>
            <p>${f.desc}</p>
            <div class="brand-list">${f.brands.map(b => `<span>${b}</span>`).join('')}</div>
            <div class="img-wrapper"><img src="images/${f.level.toLowerCase()}.jpg" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\' style=\'background:#10131f; padding:1rem; text-align:center; border-radius:20px;\'>🏢 ${f.level}层效果图</div>'"></div>
        </div>`).join('');
    }
    function renderSteps() {
        const steps = ["意向沟通","实地考察","商务洽谈","签约入驻","装修开业","运营赋能"];
        return `<div class="process-steps">${steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div>${s}<span class="tiny-text">全程陪跑</span></div>`).join('')}</div>`;
    }

    // ========== 使用本地代理（彻底解决跨域）==========
    // 注意：需要将 dingtalk_proxy.php 上传到与 HTML 相同的目录
    const DINGTALK_PROXY_URL = "dingtalk_proxy.php";

    function showToast(msg, isErr) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isErr ? '#dc2626' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 通过本地代理发送钉钉消息
    function sendToDingtalk(data, callback) {
        const text = `## 🎮 AG回城入驻申请\n\n---\n**品牌：** ${data.brand}\n**联系人：** ${data.contactName}\n**电话：** ${data.phone}\n**邮箱：** ${data.email || '未填'}\n**意向楼层：** ${data.intentFloor || '未选择'}\n**备注：** ${data.message || '无'}\n⏰ ${new Date().toLocaleString()}`;

        fetch(DINGTALK_PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                msgtype: 'markdown',
                markdown: { title: 'AG回城入驻申请', text: text },
                at: { isAtAll: false }
            })
        })
        .then(res => res.json())
        .then(result => {
            console.log('代理返回:', result);
            if (result.errcode === 0) {
                showToast('✅ 提交成功！招商经理会尽快联系您');
                callback(true);
            } else {
                console.error('钉钉错误:', result);
                showToast(`⚠️ 提交成功但通知失败（${result.errmsg || '未知错误'}）`, true);
                // 备选：复制信息
                const copyMsg = `品牌：${data.brand}\n联系人：${data.contactName}\n电话：${data.phone}\n邮箱：${data.email}\n意向：${data.intentFloor}\n备注：${data.message}`;
                if (confirm('通知发送失败，是否复制申请信息以便手动联系？')) {
                    navigator.clipboard.writeText(copyMsg).then(() => showToast('已复制信息，请拨打 0315-5379888', false));
                }
                callback(false);
            }
        })
        .catch(err => {
            console.error('代理请求异常:', err);
            showToast('⚠️ 提交成功但通知服务不可用（请检查代理是否部署）', true);
            const copyMsg = `品牌：${data.brand}\n联系人：${data.contactName}\n电话：${data.phone}\n邮箱：${data.email}\n意向：${data.intentFloor}\n备注：${data.message}`;
            if (confirm('网络异常，是否复制申请信息以便手动联系？')) {
                navigator.clipboard.writeText(copyMsg).then(() => showToast('已复制信息，请拨打 0315-5379888', false));
            }
            callback(false);
        });
    }

    // ======================= 页面内容 (5页) =======================
    const pagesContent = [
        `<div style="text-align:center; margin-bottom:1rem;"><div class="hero-badge" style="display:inline-block; background:rgba(241,90,36,0.2); padding:0.3rem 1rem; border-radius:40px;">⚡ 引领青年文化潮流</div><h1 style="font-size:2rem; background:linear-gradient(135deg,#fff,#f5a65b); -webkit-background-clip:text; background-clip:text; color:transparent;">唐山AG回城电竞商业中心</h1><p>十年沉淀 · 电竞+二次元</p><div class="img-wrapper"><img src="images/cover.jpg" onerror="this.parentNode.innerHTML='<div style=\'background:#10131f; padding:1rem;\'>🏙️ 主视觉</div>'"></div><a href="javascript:void(0)" id="gotoFormFromPage1" style="display:inline-block; background:linear-gradient(95deg,#f15a24,#ff7a3f); padding:12px 28px; border-radius:60px; margin:1rem 0; color:white; text-decoration:none;">📢 诚邀同行 变革未来 →</a></div>
        <h2>序言 · 十年沉淀</h2><p>十年的光景见证了时代的更迭，单纯的物质形态已无法满足情绪价值，让商业中心成为安抚内心、满足兴趣的综合场所是未来趋势。</p>
        <div style="display:flex; gap:0.8rem; margin:1rem 0;"><div class="stat-card"><div class="stat-number">2016→2025</div><div>电竞百亿→千亿</div></div><div class="stat-card"><div class="stat-number">42%+</div><div>二次元增速</div></div><div class="stat-card"><div class="stat-number">5亿+</div><div>泛二次元用户</div></div></div>
        <p>AG电竞战队斩获数十个冠军，青年潮流文化成为消费主流，AG回城应势而生。</p>
        <div class="golden-card"><p style="font-weight:bold;">AG于此，即见未来。</p><p>电竞动漫为核 · 潮流为翼 · 商业为基</p></div>`,
        `<h2>起因 · 看见热爱</h2><p>唐山<span class="highlight">5所高校、7个校区，逾10万名师生</span>，他们热爱电竞与二次元，却缺少专属空间。</p><div class="quote-block"><strong>"男人致死是少年"</strong> — 为曾经的少年留一处热爱角落。</div><p>周边<span class="highlight">3公里内234个居民区，50万常住人口</span>，需求巨大。</p><div class="img-wrapper"><img src="images/youth.jpg" onerror="this.parentNode.innerHTML='<div style=\'background:#10131f; padding:1rem;\'>👾 青年圈层</div>'"></div>
        <h2>转念 · 重塑商业逻辑</h2><div class="compare-card"><strong>🎯 定位不同</strong><br>不做传统购物中心，做电竞+二次元商业中心。</div><div class="compare-card"><strong>👥 客群不同</strong><br>服务“有需求的客群”——年轻人+中年热爱者。</div><div class="compare-card"><strong>🤝 关系不同</strong><br>不是运营团队，而是服务团队，与商户共成长。</div><div class="golden-card"><p>不是商业运营团队，而是商业服务团队</p></div>`,
        `<h2>🏢 六层潮玩矩阵</h2><div id="floorList"></div><div class="quote-block"><strong>✨ 生态共同体 · 客流互哺</strong><br>电竞装备+茶饮、谷子店+咖啡厅、密室+音乐餐吧动线贯通。</div>
        <h2>沉淀 · 商业生态共同体</h2><p>以<span class="highlight">业态共生、客流互哺、场景联动</span>为核心。</p>
        <div class="scene-card"><strong>🎮 电竞装备 × 电竞茶饮</strong><br>双向消费转化。</div><div class="scene-card"><strong>🎁 谷子零售 × 主题咖啡厅</strong><br>兴趣转化为客流。</div><div class="scene-card"><strong>🔐 密室体验 × 音乐餐吧</strong><br>体验与消费闭环。</div>
        <div class="golden-card"><p>共生 · 共享 · 共创</p></div>`,
        `<h2>入局 · 高能运营赋能</h2><div style="background:#1b1f2c; border-radius:28px; padding:1rem; text-align:center;">🎯 <span class="highlight">“高频活动聚客、精准社群留客、完善会员锁客”</span></div>
        <h3>🎪 高频多元活动</h3><p>年均近百场活动：“平日有展、周末有秀、假日有节”</p>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:1rem 0;"><div class="activity-card" style="background:rgba(17,21,31,0.7); padding:0.8rem; border-radius:20px;"><strong>🎮 电竞类</strong><br>观赛点/见面会</div><div class="activity-card"><strong>🌸 漫次元</strong><br>国漫展/宅舞</div><div class="activity-card"><strong>🔥 潮流类</strong><br>潮玩展/电音节</div><div class="activity-card"><strong>👨‍👩‍👧 亲子类</strong><br>才艺大赛</div></div>
        <h3>💬 精准社群运营</h3><p>电竞粉丝群、二次元同好群等，以兴趣沉淀高粘性客群。</p>
        <h3>🔐 完善会员体系</h3><ul style="margin-left:1.2rem;"><li>线上虚拟店：积分兑换/预约</li><li>线下实体一卡通：全场通用</li><li>数据赋能商户精准营销</li></ul>
        <div class="golden-card"><p>高频引流 · 社群沉淀 · 会员锁客</p></div>`,
        `<h2>📜 招商政策</h2><div class="policy-box"><div><strong>🎯 业态共生互补</strong> — 优先电竞/二次元/潮玩</div><div style="margin:12px 0;"><strong>💰 合作方式</strong> — 灵活定制</div><div><strong>📢 全域流量扶持</strong> — 共享社群/会员/活动流量</div><div><strong>🤝 全周期陪伴</strong> — 专业团队护航</div></div>
        <h2>📌 入驻流程</h2><div id="stepsContainer"></div>
        <h2>📝 入驻申请</h2><div class="form-card"><form id="joinForm"><input type="text" placeholder="品牌/公司名称 *" id="brandName"><input type="text" placeholder="联系人姓名 *" id="contactName"><input type="tel" placeholder="联系电话 *" id="phone"><input type="email" placeholder="电子邮箱" id="email"><select id="intentFloor"><option value="">意向楼层/业态</option><option>B1 烟火集市</option><option>1F 装备泉水</option><option>2F 潮玩空间</option><option>3F 先知峡谷</option><option>4F 次元穿越</option><option>5F 运练营地</option><option>6F 云中见影</option></select><textarea rows="2" id="message" placeholder="品牌简介、面积需求"></textarea><button type="submit">🚀 立即提交申请</button></form></div>
        <div style="text-align:center; margin-top:1rem;"><p><strong>招商合作咨询</strong><br>项目招商部</p><p>☎️ 0315-5379888 | 📧 dg2100@163.com</p></div><div class="tiny-text">© 2026 唐山AG回城电竞商业中心</div>`
    ];

    const container = document.getElementById('pagesContainer');
    const pages = [];
    pagesContent.forEach((html, idx) => {
        const div = document.createElement('div');
        div.className = 'page';
        div.innerHTML = html;
        container.appendChild(div);
        pages.push(div);
    });
    document.getElementById('floorList') && (document.getElementById('floorList').innerHTML = renderFloors());
    document.getElementById('stepsContainer') && (document.getElementById('stepsContainer').innerHTML = renderSteps());

    // 表单提交
    const form = document.getElementById('joinForm');
    if (form) {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const brand = document.getElementById('brandName').value.trim();
            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!brand || !name || !phone) return showToast('请填写品牌名称、联系人及电话', true);
            const btn = form.querySelector('button');
            const orig = btn.innerText;
            btn.innerText = '提交中...';
            btn.disabled = true;
            sendToDingtalk({
                brand, contactName: name, phone,
                email: document.getElementById('email').value,
                intentFloor: document.getElementById('intentFloor').value,
                message: document.getElementById('message').value
            }, () => {
                form.reset();
                btn.innerText = orig;
                btn.disabled = false;
            });
        });
    }

    // 分页 + 强制置顶
    let current = 0;
    const total = pages.length;
    const indicator = document.getElementById('pageIndicator');
    const prev = document.getElementById('prevBtn');
    const next = document.getElementById('nextBtn');
    const navItems = document.querySelectorAll('.nav-item');
    function showPage(index) {
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        pages.forEach((p, i) => p.classList.toggle('active', i === index));
        current = index;
        indicator.innerText = `${current+1}/${total}`;
        navItems.forEach((item, i) => {
            if (parseInt(item.dataset.page) === index) item.classList.add('active');
            else item.classList.remove('active');
        });
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
    }
    prev.addEventListener('click', () => showPage(current-1));
    next.addEventListener('click', () => showPage(current+1));
    navItems.forEach(item => {
        item.addEventListener('click', () => showPage(parseInt(item.dataset.page)));
    });
    showPage(0);

    function jumpForm() { showPage(total-1); setTimeout(() => document.getElementById('joinForm')?.scrollIntoView({behavior:'smooth', block:'center'}), 150); }
    const gotoBtn = document.getElementById('gotoFormFromPage1');
    if (gotoBtn) gotoBtn.addEventListener('click', (e) => { e.preventDefault(); jumpForm(); });
</script>
</body>
</html>
