<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="与潮流连接更紧密的商业中心，与当下情绪更有共鸣的全新理念">
    <title>唐山AG回城电竞商业中心 | 招商手册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #05070c;
            color: #ffffff;
            line-height: 1.5;
            font-size: 16px;
        }

        /* 主容器 */
        .app {
            max-width: 720px;
            margin: 0 auto;
            background: linear-gradient(145deg, #0a0c16 0%, #0f1220 100%);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 顶部导航栏 (毛玻璃固定) */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1100;
            background: rgba(8, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(241, 90, 36, 0.3);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
        }
        .top-nav::-webkit-scrollbar {
            height: 2px;
        }
        .nav-logo {
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f5a65b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .nav-menu {
            display: flex;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
        }
        .nav-item {
            background: rgba(241, 90, 36, 0.12);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f5a65b;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(241, 90, 36, 0.3);
            flex-shrink: 0;
        }
        .nav-item:active {
            background: #f15a24;
            color: white;
            transform: scale(0.96);
        }
        .nav-item.active {
            background: #f15a24;
            color: white;
            border-color: #f15a24;
        }

        /* 页面容器 */
        .pages-container {
            position: relative;
        }

        .page {
            display: none;
            animation: fadeUp 0.3s ease-out;
            padding: 1.2rem 1.2rem 90px 1.2rem;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 720px;
            margin: 0 auto;
            background: rgba(8, 10, 20, 0.92);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(241, 90, 36, 0.35);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            z-index: 1000;
            border-radius: 28px 28px 0 0;
            font-weight: 500;
        }

        .nav-btn {
            background: rgba(241, 90, 36, 0.18);
            border: 1px solid rgba(241, 90, 36, 0.5);
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f5a65b;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .nav-btn:active {
            background: #f15a24;
            color: white;
            transform: scale(0.96);
        }

        .page-indicator {
            background: #1a1f2c;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f5a65b;
            letter-spacing: 0.5px;
        }

        /* 通用排版组件 */
        h2, .section-title {
            font-size: 1.65rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(125deg, #fff, #f5a65b, #ff884d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-left: 5px solid #f15a24;
            padding-left: 0.9rem;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f5a65b;
            margin: 0.8rem 0 0.5rem;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(241,90,36,0.2);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            border: 1px solid rgba(241,90,36,0.5);
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }

        .stat-card {
            background: rgba(19, 23, 34, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1rem 0.2rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: #f5a65b;
        }

        .quote-block {
            background: rgba(241,90,36,0.1);
            border-left: 4px solid #f15a24;
            padding: 1rem 1.2rem;
            border-radius: 24px;
            margin: 1rem 0;
        }

        .golden-card {
            background: linear-gradient(115deg, #f15a24, #ff7a3f);
            border-radius: 28px;
            padding: 1.3rem;
            text-align: center;
            margin: 1.5rem 0;
            box-shadow: 0 12px 20px rgba(241,90,36,0.25);
        }

        .floor-item, .policy-box, .form-card, .compare-card, .scene-card, .activity-card {
            background: rgba(17, 21, 31, 0.7);
            border-radius: 28px;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid rgba(241,90,36,0.15);
        }

        .brand-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .brand-list span {
            background: #232838;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 1rem 0;
        }

        @media (max-width: 500px) {
            .activity-grid { grid-template-columns: 1fr; }
            .page { padding: 1rem 1rem 90px 1rem; }
            h2 { font-size: 1.45rem; }
            .nav-item { padding: 5px 10px; font-size: 0.7rem; }
        }

        .img-placeholder {
            background: #10131f;
            min-height: 130px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px dashed #f15a24;
            color: #8f9bb5;
            font-size: 0.7rem;
        }

        .img-wrapper {
            margin: 1rem 0;
            border-radius: 24px;
            overflow: hidden;
        }
        .img-wrapper img {
            width: 100%;
            display: block;
            border-radius: 20px;
        }

        input, select, textarea {
            background: #1b1f2c;
            border: 1px solid #2f3548;
            padding: 12px 18px;
            border-radius: 60px;
            width: 100%;
            margin-bottom: 12px;
            color: white;
            font-size: 0.9rem;
        }
        textarea { border-radius: 24px; }
        button {
            background: linear-gradient(95deg, #f15a24, #ff7a3f);
            border: none;
            width: 100%;
            padding: 13px;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }

        .tiny-text {
            font-size: 0.7rem;
            color: #8f9bb5;
            text-align: center;
            margin-top: 0.5rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            background: #10b981;
            color: white;
        }
        .toast-msg.show { opacity: 1; }

        .process-steps {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 1rem 0;
        }
        .step {
            background: #141a28;
            border-radius: 28px;
            padding: 0.7rem 0.2rem;
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .step-num {
            background: #f15a24;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            margin-bottom: 6px;
            font-weight: 800;
        }
        .highlight { color: #f5a65b; font-weight: 700; }
    </style>
</head>
<body>
<div class="app">
    <!-- 新增顶部导航栏 -->
    <div class="top-nav">
        <div class="nav-logo">
		<img src="images/ag-logo.jpg" alt="AG回城" style="height: 32px; width: auto; display: block; max-width: 120px;" onerror="this.onerror=null; this.parentNode.innerHTML='⚡ AG·回城'; this.parentNode.style.fontWeight='800'; this.parentNode.style.background='linear-gradient(135deg,#fff,#f5a65b)'; this.parentNode.style.webkitBackgroundClip='text'; this.parentNode.style.backgroundClip='text'; this.parentNode.style.color='transparent';">
		</div>
        <div class="nav-menu" id="topNavMenu">
            <div class="nav-item" data-page="0">首页</div>
            <div class="nav-item" data-page="1">热爱·变革</div>
            <div class="nav-item" data-page="2">业态·共生</div>
            <div class="nav-item" data-page="3">运营赋能</div>
            <div class="nav-item" data-page="4">招商入驻</div>
        </div>
    </div>

    <div class="pages-container" id="pagesContainer"></div>

    <div class="bottom-nav" id="bottomNav">
        <div class="nav-btn" id="prevBtn">◀ 上一页</div>
        <div class="page-indicator" id="pageIndicator">1 / 5</div>
        <div class="nav-btn" id="nextBtn">下一页 ▶</div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ======================= 楼层数据 =======================
    const floors = [
        { level: "B1", name: "烟火集市", desc: "生鲜市集+特色餐饮。让买菜也变成一件有意思的事，兼顾日常所需与精神格调。", brands: ["大鑫烧鸟","唐人夜食","刀板香","衢小满"] },
        { level: "1F", name: "装备泉水", desc: "电竞装备+数码潮品+美妆茶饮。推门即是氛围感铺满的时尚空间。", brands: ["华为","荣耀","汉堡王","吉野家","瑞幸咖啡","宝可梦授权店"] },
        { level: "2F", name: "潮玩空间", desc: "二次元专属聚集地。谷子店、IP店、手办店、妆造间——给同好一个家。", brands: ["飞享俱乐部","射手部落","谷子店","WeSpeace腾讯官方店"] },
        { level: "3F", name: "先知峡谷", desc: "亲子成长空间。集儿童教育、体能锻炼、休闲娱乐于一体。", brands: ["帆书","枫丹云舍","海伦钢琴"] },
        { level: "4F", name: "次元穿越", desc: "电竞+沉浸娱乐+夜经济。KPL官方观赛点、密室、影院、音乐餐吧。", brands: ["金逸影城","云海肴","共和之约"] },
        { level: "5F", name: "运练营地", desc: "24h运动健康空间。贴合健康趋势，解锁全天候运动生活。", brands: ["绿树电竞","麦粒KTV","自助舞蹈室"] },
        { level: "6F", name: "云中见影", desc: "宠物主题空间。给毛孩子一个地方，也给宠物主一个社交场。", brands: ["多家品牌洽谈中"] }
    ];

    function renderFloors() {
        return floors.map(f => {
            const brandHtml = f.brands.map(b => `<span>${b}</span>`).join('');
            const imgFile = `images/${f.level.toLowerCase()}.jpg`;
            return `<div class="floor-item">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                            <span style="background:#f15a24; padding:4px 12px; border-radius:60px; font-weight:bold;">${f.level}</span>
                            <strong style="font-size:1.2rem;">${f.name}</strong>
                        </div>
                        <p style="font-size:0.9rem; margin-bottom:8px;">${f.desc}</p>
                        <div class="brand-list">${brandHtml}</div>
                        <div class="img-wrapper">
                            <img src="${imgFile}" alt="${f.level}层效果图" style="width:100%; border-radius:18px;" onerror="this.style.display='none'; this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🏢</span><span>【${f.level}层氛围示意】请上传 ${imgFile}</span></div>'">
                        </div>
                    </div>`;
        }).join('');
    }

    function renderSteps() {
        const steps = ["意向沟通", "实地考察", "商务洽谈", "签约入驻", "装修开业", "运营赋能"];
        return `<div class="process-steps">${steps.map((s, idx) => `<div class="step"><div class="step-num">${idx+1}</div>${s}<span class="tiny-text">全程陪跑</span></div>`).join('')}</div>`;
    }

    // 钉钉配置
    const DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=362c8402aff4460cbb707cd7df9d88e44a6b7ca8fe588df1db121befee140486";
    function showToast(msg, isErr) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isErr ? '#dc2626' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2800);
    }
    function sendToDingtalk(data, callback) {
        const text = `## 🎮 AG回城入驻申请\n---\n**品牌：** ${data.brand}\n**联系人：** ${data.contactName}\n**电话：** ${data.phone}\n**邮箱：** ${data.email || '未填'}\n**意向楼层：** ${data.intentFloor || '未选择'}\n**备注：** ${data.message || '无'}\n⏰ ${new Date().toLocaleString('zh-CN')}`;
        const xhr = new XMLHttpRequest();
        xhr.open('POST', DINGTALK_WEBHOOK, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200 && JSON.parse(xhr.responseText).errcode === 0) showToast('✅ 提交成功！招商经理会联系您');
                else showToast('⚠️ 提交成功，但通知异常', true);
                if (callback) callback();
            }
        };
        xhr.send(JSON.stringify({ msgtype: "markdown", markdown: { title: "AG回城入驻申请", text: text }, at: { isAtAll: false } }));
    }

    // ======================= 页面内容定义（5页优化排版）=======================
    const pagesContent = [];

    // 第1页：封面 + 序言 + 十年沉淀高光
    pagesContent.push(`
        <div class="hero" style="text-align:center; margin-bottom:1rem;">
            <div class="hero-badge">⚡ 引领青年文化潮流 · 重塑城市商业未来</div>
            <h1 style="font-size:2rem; font-weight:800; background:linear-gradient(135deg,#fff,#f5a65b,#ff7a2f); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">唐山AG回城电竞商业中心</h1>
            <p style="margin:0.5rem 0; opacity:0.9;">十年沉淀 · 电竞+二次元 | 打造唐山商业新样板</p>
            <div class="img-wrapper"><img src="images/cover.jpg" alt="主视觉" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🏙️ 主视觉</span><span>建议上传 images/cover.jpg</span></div>'"></div>
            <div style="margin:1rem 0;"><a href="javascript:void(0)" id="gotoFormFromPage1" style="background:linear-gradient(95deg,#f15a24,#ff7a3f); padding:12px 28px; border-radius:60px; display:inline-block; font-weight:bold; text-decoration:none; color:white;">📢 诚邀同行 变革未来 →</a></div>
        </div>
        <h2>序言 · 十年沉淀 重塑未来</h2>
        <p>十年的光景我们见证了时代的更迭，从即时通信到AI智能，人们对于商业中心的思考也在不断迭代。单纯的物质形态已无法满足当下的情绪价值，所以让商业中心成为安抚内心、满足兴趣和日常购物的综合场所才是未来的商业趋势。</p>
        <div class="stats-row" style="display:flex; gap:0.8rem; margin:1rem 0;">
            <div class="stat-card"><div class="stat-number">2016→2025</div><div>电竞百亿→千亿</div></div>
            <div class="stat-card"><div class="stat-number">42%+</div><div>二次元复合增速</div></div>
            <div class="stat-card"><div class="stat-number">5亿+</div><div>泛二次元用户</div></div>
        </div>
        <p>十年间我们见证了AG电竞战队在世界舞台异军突起，斩获数十个冠军。当青年潮流文化成为消费主流，唐山AG回城电竞商业中心应势而生。</p>
        <div class="golden-card"><p style="font-weight:bold; font-size:1.2rem;">AG于此，即见未来。</p><p>电竞动漫为核 · 潮流为翼 · 商业为基</p></div>
        <div class="img-wrapper"><img src="images/highlight.jpg" alt="高光时刻" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🏆 十年高光</span><span>images/highlight.jpg</span></div>'"></div>
    `);

    // 第2页：起因 · 看见热爱 + 转念重塑商业逻辑
    pagesContent.push(`
        <h2>起因 · 看见热爱</h2>
        <p>唐山这片土地上，藏着被忽视却真实存在的需求群体——<span class="highlight">5所高校、7个校区，逾10万名师生</span>，他们追潮而行，热爱电竞世界，眷恋二次元天地。</p>
        <div class="quote-block"><strong>"男人致死是少年"</strong> — AG回城愿为每一个曾经的少年留一处安放热爱的角落。</div>
        <p>项目周边<span class="highlight">3公里内234个居民区，50万常住人口</span>。不是没有需求，而是没有精准匹配的空间。</p>
        <div class="img-wrapper"><img src="images/youth.jpg" alt="青年圈层" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>👾 青年圈层</span><span>images/youth.jpg</span></div>'"></div>
        
        <h2 style="margin-top:1.5rem;">转念 · 重塑商业逻辑</h2>
        <div class="compare-card"><strong>🎯 定位不同</strong><br>不做传统购物中心，做电竞、动漫、二次元的商业中心，承载传统商业无法承载的形态。</div>
        <div class="compare-card"><strong>👥 客群不同</strong><br>传统商场服务“有消费能力的客群”，我们服务“有需求的客群”——年轻人+中年热爱者。</div>
        <div class="compare-card"><strong>🤝 关系不同</strong><br>不是商业运营团队，而是商业服务团队。与商户共成长、同破局。</div>
        <div class="golden-card"><p>不是商业运营团队，而是商业服务团队</p><p style="font-size:0.8rem;">与商户共成长 · 创未来</p></div>
        <div class="img-wrapper"><img src="images/market.jpg" alt="市场数据" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>📊 市场数据</span><span>images/market.jpg</span></div>'"></div>
    `);

    // 第3页：六层潮玩矩阵 + 商业生态共同体核心
    pagesContent.push(`
        <h2>🏢 六层潮玩矩阵</h2>
        <div id="floorList"></div>
        <div class="quote-block"><strong>✨ 生态共同体 · 客流互哺</strong><br>电竞装备+茶饮、谷子店+咖啡厅、密室+音乐餐吧动线贯通，实现商户共生。</div>
        <div class="img-wrapper"><img src="images/atmosphere.jpg" alt="整体动线" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🔄 整体动线</span><span>images/atmosphere.jpg</span></div>'"></div>
        
        <h2 style="margin-top:1.2rem;">沉淀 · 商业生态共同体</h2>
        <p>我们摒弃传统商业“简单排布”的粗放模式，坚持以<span class="highlight">业态共生、客流互哺、场景联动</span>为核心。</p>
        <div class="scene-card"><strong>🎮 电竞装备 × 电竞茶饮</strong><br>现场调试体验+休憩茶饮，双向消费转化。</div>
        <div class="scene-card"><strong>🎁 谷子零售 × 主题咖啡厅</strong><br>逛展选购后社交分享，兴趣转化为持续客流。</div>
        <div class="scene-card"><strong>🔐 密室体验 × 音乐餐吧</strong><br>情绪高点无缝衔接，体验与消费闭环。</div>
        <div class="golden-card"><p>共生 · 共享 · 共创</p><p>设计商业氛围 · 运营未来价值</p></div>
        <div class="img-wrapper"><img src="images/1.jpg" alt="生态概念" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🌿 生态共同体</span><span>示意图片</span></div>'"></div>
    `);

    // 第4页：高能运营赋能（活动+社群+会员）
    pagesContent.push(`
        <h2>入局 · 高能运营赋能</h2>
        <div style="background:#1b1f2c; border-radius:28px; padding:1rem; margin:0.5rem 0 1rem 0; text-align:center;">
            🎯 <span class="highlight">“高频活动聚客、精准社群留客、完善会员锁客”</span>
        </div>
        <h3>🎪 高频多元活动</h3>
        <p>年均近百场活动：“平日有展、周末有秀、假日有节”。</p>
        <div class="activity-grid">
            <div class="activity-card"><strong>🎮 电竞类</strong><br>观赛点/粉丝见面会/表演赛</div>
            <div class="activity-card"><strong>🌸 漫次元类</strong><br>国漫微街展/随机宅舞/吃谷大会</div>
            <div class="activity-card"><strong>🔥 潮流类</strong><br>潮玩艺术展/IP快闪/电音节</div>
            <div class="activity-card"><strong>👨‍👩‍👧 亲子类</strong><br>才艺大赛/嘉年华</div>
        </div>
        <div class="img-wrapper"><img src="images/6.jpg" alt="活动集锦" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🎪 活动集锦</span><span>示意</span></div>'"></div>
        
        <h3>💬 精准社群运营</h3>
        <p>几十个兴趣社群：电竞粉丝群、二次元同好群、潮玩玩家群、亲子成长群，以兴趣为纽带沉淀高粘性客群。</p>
        <div class="img-wrapper"><img src="images/7.jpg" alt="社群互动" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>💬 社群互动</span><span>示意</span></div>'"></div>
        
        <h3>🔐 完善会员体系</h3>
        <ul style="margin-left:1.2rem; margin-bottom:1rem;">
            <li><strong class="highlight">线上虚拟店</strong>：积分兑换/服务预约/活动报名</li>
            <li><strong class="highlight">线下实体一卡通</strong>：全场通用，绑定长期消费</li>
            <li><strong class="highlight">精准数据赋能</strong>：为商户提供营销参考</li>
        </ul>
        <div class="golden-card"><p>高频活动引流 · 精准社群沉淀 · 会员锁客增值</p><p style="font-size:0.75rem;">共生共赢</p></div>
    `);

    // 第5页：招商政策+入驻流程+入驻申请表单
    pagesContent.push(`
        <h2>📜 招商政策</h2>
        <div class="policy-box">
            <div><strong>🎯 业态共生互补</strong> — 优先电竞/二次元/潮玩</div>
            <div style="margin:12px 0;"><strong>💰 合作方式</strong> — 灵活定制</div>
            <div><strong>📢 全域流量扶持</strong> — 共享社群/会员/活动流量</div>
            <div style="margin-top:12px;"><strong>🤝 全周期陪伴</strong> — 专业团队护航</div>
        </div>
        <div class="img-wrapper"><img src="images/brands.jpg" alt="品牌墙" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🏷️ 品牌墙</span><span>images/brands.jpg</span></div>'"></div>
        
        <h2>📌 入驻流程</h2>
        <div id="stepsContainer"></div>
        <div class="img-wrapper"><img src="images/sign.jpg" alt="签约场景" style="width:100%; border-radius:24px;" onerror="this.parentNode.innerHTML='<div class=\'img-placeholder\'><span>🤝 签约场景</span><span>images/sign.jpg</span></div>'"></div>
        
        <h2>📝 入驻申请</h2>
        <div class="form-card">
            <form id="joinForm">
                <input type="text" placeholder="品牌/公司名称 *" id="brandName">
                <input type="text" placeholder="联系人姓名 *" id="contactName">
                <input type="tel" placeholder="联系电话 *" id="phone">
                <input type="email" placeholder="电子邮箱" id="email">
                <select id="intentFloor">
                    <option value="">意向楼层/业态</option>
                    <option>B1 烟火集市</option><option>1F 装备泉水</option><option>2F 潮玩空间</option>
                    <option>3F 先知峡谷</option><option>4F 次元穿越</option><option>5F 运练营地</option><option>6F 云中见影</option>
                </select>
                <textarea rows="2" id="message" placeholder="品牌简介、面积需求"></textarea>
                <button type="submit">🚀 立即提交申请</button>
            </form>
        </div>
        <div style="text-align:center; margin-top:1rem;">
            <p><strong>招商合作咨询</strong><br>项目招商部</p>
            <p>☎️ 0315-5379888 | 📧 dg2100@163.com</p>
        </div>
        <div class="tiny-text">© 2026 唐山AG回城电竞商业中心 | 电竞+二次元新地标</div>
    `);

    // 构建所有页面DOM
    const container = document.getElementById('pagesContainer');
    const pages = [];
    pagesContent.forEach((html, idx) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.innerHTML = html;
        container.appendChild(pageDiv);
        pages.push(pageDiv);
    });

    // 动态渲染楼层列表、流程步骤
    const floorContainer = document.getElementById('floorList');
    if (floorContainer) floorContainer.innerHTML = renderFloors();
    const stepsContainer = document.getElementById('stepsContainer');
    if (stepsContainer) stepsContainer.innerHTML = renderSteps();

    // 表单绑定

    const formElem = document.getElementById('joinForm');
    if (formElem) {
        formElem.addEventListener('submit', (e) => {
            e.preventDefault();
            const brand = document.getElementById('brandName').value.trim();
            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!brand || !name || !phone) return showToast('请填写品牌名称、联系人及电话', true);
            const btn = formElem.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = '提交中...';
            btn.disabled = true;
            sendToDingtalk({
                brand, contactName: name, phone,
                email: document.getElementById('email').value,
                intentFloor: document.getElementById('intentFloor').value,
                message: document.getElementById('message').value
            }, () => {
                formElem.reset();
                btn.innerText = originalText;
                btn.disabled = false;
            });
        });
    }

    // 分页逻辑 + 顶部导航高亮
    let currentPage = 0;
    const total = pages.length;
    const indicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const navItems = document.querySelectorAll('.nav-item');

    function updateNavActive(index) {
        navItems.forEach((item, i) => {
            if (parseInt(item.getAttribute('data-page')) === index) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }

    function showPage(index) {
        if (index < 0) index = 0;
		if (index >= total) index = total - 1;
    	pages.forEach((p, i) => {
			p.classList.toggle('active', i === index);
		});
		currentPage = index;
		indicator.innerText = `${currentPage+1} / ${total}`;
    	updateNavActive(currentPage);
    
		// 强制滚动到最顶部（瞬间置顶，避免停留原位置）
		window.scrollTo(0, 0);
		document.documentElement.scrollTop = 0;
		document.body.scrollTop = 0; // 兼容部分移动端
    }

    prevBtn.addEventListener('click', () => showPage(currentPage - 1));
    nextBtn.addEventListener('click', () => showPage(currentPage + 1));

    // 顶部导航点击事件
    navItems.forEach(item => {
        item.addEventListener('click', (e) => {
            const pageNum = parseInt(item.getAttribute('data-page'));
            if (!isNaN(pageNum)) showPage(pageNum);
        });
    });

    showPage(0);

    // 跳转到招商表单页面（第5页）
    function jumpToForm() {
        showPage(total - 1);
        setTimeout(() => {
            const formSec = document.getElementById('joinForm');
            if (formSec) formSec.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 150);
    }
    const gotoBtn1 = document.getElementById('gotoFormFromPage1');
    if (gotoBtn1) gotoBtn1.addEventListener('click', (e) => { e.preventDefault(); jumpToForm(); });
    // 处理其他锚点
    document.querySelectorAll('a[href="#applyForm"]').forEach(a => {
        a.addEventListener('click', (e) => { e.preventDefault(); jumpToForm(); });
    });
</script>
</body>
</html>
